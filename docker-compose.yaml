name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: joindevops/mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: joindevops/catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
    frontend:
    build: ./frontend
    image: joindevops/frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
networks:
  default:
    name: roboshop
    driver: bridge
    external: false